set -g prefix C-a
bind C-a send-prefix

# XXX Steven: broken: copy to clipboard.
# bind -t emacs-copy M-w copy-pipe "xclip -sel clip -i"

set -g history-limit 100000
set -g window-size smallest

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind u set-window-option synchronize-panes

# Thicc pane borders
set -g pane-border-lines heavy

# Status bar configuration - 12-hour AM/PM time format
set -g status-right '#[fg=colour233,bg=colour241,bold] %m/%d #[fg=colour233,bg=colour245,bold] %I:%M %p '

# Claude Code notifications
set -g focus-events on

# Per-window Claude state, driven by Claude Code hooks (settings.json):
#   waiting -> blocked on you (permission/idle), bright WAIT
#   idle    -> turn finished, your move, dim check
#   busy    -> working, no marker
set -g window-status-format         "#I:#W#{?window_flags,#{window_flags},}#{?#{==:#{@claude},waiting},🙋,#{?#{==:#{@claude},idle},✅,#{?#{==:#{@claude},busy},⏳,}}}"
set -g window-status-current-format "#I:#W#{?window_flags,#{window_flags},}#{?#{==:#{@claude},waiting},🙋,#{?#{==:#{@claude},idle},✅,#{?#{==:#{@claude},busy},⏳,}}}"
